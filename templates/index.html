<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map');

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

let countyLayer;
let roadsLayer;
let citiesLayer;
let townshipsLayer;
let floodLayer;

async function loadMap() {

  // COUNTY BOUNDARY
  const countyResponse = await fetch('./static/clinton_boundary.geojson');
  const countyData = await countyResponse.json();

  countyLayer = L.geoJSON(countyData, {
    style: {
      color: '#ff0000',
      weight: 3,
      fillOpacity: 0.05
    }
  }).addTo(map);

  map.fitBounds(countyLayer.getBounds());


  // ROADS
  try {
    const roadsResponse = await fetch('./static/Roads/roads.geojson');
    const roadsData = await roadsResponse.json();

    roadsLayer = L.geoJSON(roadsData, {
      style: {
        color: '#444444',
        weight: 1
      }
    });
  } catch (err) {
    console.log('Road layer not loaded');
  }


  // CITIES
  try {
    const citiesResponse = await fetch('./static/Cities/cities.geojson');
    const citiesData = await citiesResponse.json();

    citiesLayer = L.geoJSON(citiesData, {
      style: {
        color: '#7a00cc',
        weight: 2,
        fillOpacity: 0.1
      }
    });
  } catch (err) {
    console.log('Cities layer not loaded');
  }


  // TOWNSHIPS
  try {
    const townshipResponse = await fetch('./static/Townships/townships.geojson');
    const townshipData = await townshipResponse.json();

    townshipsLayer = L.geoJSON(townshipData, {
      style: {
        color: '#0066ff',
        weight: 2,
        dashArray: '4,4',
        fillOpacity: 0
      }
    });
  } catch (err) {
    console.log('Township layer not loaded');
  }


  // FLOOD ZONES
  try {
    const floodResponse = await fetch('./static/Floodzones/floodzones.geojson');
    const floodData = await floodResponse.json();

    floodLayer = L.geoJSON(floodData, {
      style: {
        color: '#00aaff',
        weight: 1,
        fillColor: '#00ccff',
        fillOpacity: 0.25
      }
    });
  } catch (err) {
    console.log('Flood layer not loaded');
  }


  const overlays = {};

  if (roadsLayer) overlays['Roads'] = roadsLayer;
  if (citiesLayer) overlays['Cities'] = citiesLayer;
  if (townshipsLayer) overlays['Townships'] = townshipsLayer;
  if (floodLayer) overlays['Flood Zones'] = floodLayer;

  L.control.layers(
    {
      'OpenStreetMap': osm
    },
    overlays,
    {
      collapsed: false
    }
  ).addTo(map);

}

loadMap();

</script>

</body>
</html>
