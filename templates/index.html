<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
  />

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .city-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #4b0082;
      font-size: 12px;
      font-weight: bold;
    }

    .legend {
      background: white;
      padding: 10px;
      line-height: 1.6;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0,0,0,0.4);
      font-size: 13px;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;

      background: rgba(255,255,255,0.95);

      padding: 10px 14px;

      border-radius: 6px;

      box-shadow: 0 0 8px rgba(0,0,0,0.3);

      max-width: 280px;

      font-size: 14px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    @media (max-width: 768px) {

      .info-panel {

        top: auto;
        bottom: 10px;
        left: 10px;

        max-width: 220px;

        font-size: 12px;
      }

      .leaflet-control-layers {
        font-size: 12px;
      }

    }

  </style>
</head>

<body>

<div class="info-panel">

  <div class="info-title">
    Clinton County GIS
  </div>

  Property and infrastructure GIS viewer using:
  roads, flood zones, cities, townships, school
  districts, and county limits.

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>

const map = L.map('map');

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);

L.Control.geocoder({
  defaultMarkGeocode: true
}).addTo(map);

let countyLayer;
let roadsLayer;
let citiesLayer;
let townshipsLayer;
let floodLayer;
let schoolLayer;

async function loadMap() {

  // COUNTY BOUNDARY

  const countyResponse =
    await fetch('./static/clinton_boundary.geojson');

  const countyData =
    await countyResponse.json();

  countyLayer = L.geoJSON(countyData, {

    style: {
      color: '#ff0000',
      weight: 3,
      fillOpacity: 0.02
    }

  }).addTo(map);

  map.fitBounds(countyLayer.getBounds());


  // ROADS

  try {

    const roadsResponse =
      await fetch('./static/Roads/roads.geojson');

    const roadsData =
      await roadsResponse.json();

    roadsLayer = L.geoJSON(roadsData, {

      style: {
        color: '#666666',
        weight: 0.7,
        opacity: 0.35,
        dashArray: '3,3'
      },

      onEachFeature: function(feature, layer) {

        if (feature.properties) {

          let popup = '';

          for (const key in feature.properties) {

            popup +=
              '<b>' + key + '</b>: '
              + feature.properties[key]
              + '<br>';

          }

          layer.bindPopup(popup);

        }

      }

    });

  } catch (err) {

    console.log('Road layer not loaded');

  }


  // CITIES

  try {

    const citiesResponse =
      await fetch('./static/Cities/cities.geojson');

    const citiesData =
      await citiesResponse.json();

    citiesLayer = L.geoJSON(citiesData, {

      pointToLayer: function(feature, latlng) {

        return L.circleMarker(latlng, {

          radius: 5,

          fillColor: '#7a00cc',

          color: '#000',

          weight: 1,

          opacity: 1,

          fillOpacity: 0.85

        });

      },

      onEachFeature: function(feature, layer) {

        if (feature.properties && feature.properties.NAME) {

          layer.bindPopup(
            feature.properties.NAME
          );

          layer.bindTooltip(
            feature.properties.NAME,
            {
              permanent: true,
              direction: 'top',
              className: 'city-label'
            }
          );

        }

      }

    });

  } catch (err) {

    console.log('Cities layer not loaded');

  }


  // TOWNSHIPS

  try {

    const townshipResponse =
      await fetch('./static/Townships/townships.geojson');

    const townshipData =
      await townshipResponse.json();

    townshipsLayer = L.geoJSON(townshipData, {

      style: {

        color: '#7aa6ff',

        weight: 1,

        dashArray: '2,6',

        opacity: 0.45,

        fillOpacity: 0

      },

      onEachFeature: function(feature, layer) {

        if (feature.properties && feature.properties.NAME) {

          layer.bindPopup(
            'Township: ' +
            feature.properties.NAME
          );

        }

      }

    });

  } catch (err) {

    console.log('Township layer not loaded');

  }


  // FLOOD ZONES

  try {

    const floodResponse =
      await fetch('./static/Floodzones/floodzones.geojson');

    const floodData =
      await floodResponse.json();

    floodLayer = L.geoJSON(floodData, {

      style: {

        color: '#00aaff',

        weight: 1,

        fillColor: '#00ccff',

        fillOpacity: 0.20

      },

      onEachFeature: function(feature, layer) {

        if (feature.properties) {

          let popup = '';

          for (const key in feature.properties) {

            popup +=
              '<b>' + key + '</b>: '
              + feature.properties[key]
              + '<br>';

          }

          layer.bindPopup(popup);

        }

      }

    });

  } catch (err) {

    console.log('Flood layer not loaded');

  }


  // SCHOOL DISTRICTS

  try {

    const schoolResponse =
      await fetch('./static/schooldistricts/school_districts.geojson');

    const schoolData =
      await schoolResponse.json();

    schoolLayer = L.geoJSON(schoolData, {

      style: {

        color: '#008800',

        weight: 3,

        opacity: 0.9,

        dashArray: '8,4',

        fillOpacity: 0.02

      },

      onEachFeature: function(feature, layer) {

        if (feature.properties) {

          const districtName =
            feature.properties.NAME ||
            feature.properties.NAMELSAD ||
            feature.properties.DIST_NAME ||
            'School District';

          layer.bindPopup(
            'School District: ' + districtName
          );

        }

      }

    });

  } catch (err) {

    console.log(err);
    console.log('School district layer not loaded');

  }


  // DEFAULT ACTIVE LAYERS

  if (roadsLayer) roadsLayer.addTo(map);

  if (citiesLayer) citiesLayer.addTo(map);

  if (townshipsLayer) townshipsLayer.addTo(map);

  if (schoolLayer) schoolLayer.addTo(map);


  // OVERLAY CONTROLS

  const overlays = {};

  if (roadsLayer)
    overlays['Roads'] = roadsLayer;

  if (citiesLayer)
    overlays['Cities'] = citiesLayer;

  if (townshipsLayer)
    overlays['Townships'] = townshipsLayer;

  if (floodLayer)
    overlays['Flood Zones'] = floodLayer;

  if (schoolLayer)
    overlays['School Districts'] = schoolLayer;


  L.control.layers(
    {
      'OpenStreetMap': osm
    },
    overlays,
    {
      collapsed: false
    }
  ).addTo(map);


  // LEGEND

  const legend = L.control({
    position: 'bottomright'
  });

  legend.onAdd = function () {

    const div = L.DomUtil.create(
      'div',
      'legend'
    );

    div.innerHTML = `

      <b>Legend</b><br><br>

      <span style="color:#ff0000;">━━</span>
      County Boundary<br>

      <span style="color:#666666;">━━</span>
      Roads<br>

      <span style="color:#7aa6ff;">━━</span>
      Townships<br>

      <span style="color:#00aaff;">━━</span>
      Flood Zones<br>

      <span style="color:#008800;">━━</span>
      School Districts<br>

      <span style="color:#7a00cc;">●</span>
      Cities

    `;

    return div;

  };

  legend.addTo(map);

}

loadMap();

</script>

</body>
</html>
