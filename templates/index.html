<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clinton County GIS</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<style>

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
}

#container {
    display: flex;
    height: 100%;
}

#sidebar {
    width: 300px;
    background: #f4f4f4;
    padding: 15px;
    overflow-y: auto;
    border-right: 1px solid #ccc;
}

#map {
    flex-grow: 1;
    height: 100%;
}

.sidebar-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

.sidebar-section {
    margin-bottom: 20px;
}

.legend {
    background: white;
    padding: 10px;
    line-height: 1.6;
    border-radius: 5px;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
}

.city-label {
    background: transparent;
    border: none;
    box-shadow: none;
    font-size: 12px;
    font-weight: bold;
    color: black;
}

@media (max-width: 768px) {

    #container {
        flex-direction: column;
    }

    #sidebar {
        width: 100%;
        height: 180px;
        border-right: none;
        border-bottom: 1px solid #ccc;
    }
}

</style>
</head>

<body>

<div id="container">

    <div id="sidebar">

        <div class="sidebar-title">
            Clinton County GIS
        </div>

        <div class="sidebar-section">
            <b>Current Layers</b>
            <ul>
                <li>Roads</li>
                <li>Cities</li>
                <li>Flood Zones</li>
                <li>Townships</li>
                <li>County Boundary</li>
            </ul>
        </div>

        <div class="sidebar-section">
            <b>Instructions</b>
            <p>
                Use the layer control in the upper-right corner
                to toggle GIS layers on and off.
            </p>
        </div>

        <div class="sidebar-section">
            <b>Future Expansion</b>
            <ul>
                <li>Streams</li>
                <li>Bridges</li>
                <li>Parcel Viewer</li>
                <li>Road Conditions</li>
                <li>Work Orders</li>
            </ul>
        </div>

    </div>

    <div id="map"></div>

</div>

<script>

const map = L.map('map').setView([39.53, -94.52], 10);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);

L.control.scale().addTo(map);

L.Control.geocoder({
    defaultMarkGeocode: true
}).addTo(map);

async function loadLayers() {

    const boundaryData = await fetch('/static/clinton_boundary.geojson').then(r => r.json());
    const roadsData = await fetch('/static/roads.geojson').then(r => r.json());
    const citiesData = await fetch('/static/cities.geojson').then(r => r.json());
    const floodData = await fetch('/static/floodzones.geojson').then(r => r.json());
    const townshipData = await fetch('/static/townships.geojson').then(r => r.json());

    const boundaryLayer = L.geoJSON(boundaryData, {
        style: {
            color: 'black',
            weight: 4,
            fillOpacity: 0
        }
    });

    const roadsLayer = L.geoJSON(roadsData, {
        style: {
            color: '#cc0000',
            weight: 2
        },
        onEachFeature: function(feature, layer) {

            if (feature.properties) {

                let popupContent = '';

                for (const key in feature.properties) {
                    popupContent += `<b>${key}</b>: ${feature.properties[key]}<br>`;
                }

                layer.bindPopup(popupContent);
            }
        }
    });

    const citiesLayer = L.geoJSON(citiesData, {

        pointToLayer: function(feature, latlng) {

            return L.circleMarker(latlng, {
                radius: 6,
                fillColor: '#0055ff',
                color: '#000',
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            });
        },

        onEachFeature: function(feature, layer) {

            if (feature.properties.NAME) {

                layer.bindPopup(feature.properties.NAME);

                layer.bindTooltip(
                    feature.properties.NAME,
                    {
                        permanent: true,
                        direction: 'top',
                        className: 'city-label'
                    }
                );
            }
        }
    });

    const floodLayer = L.geoJSON(floodData, {
        style: {
            color: '#0066ff',
            weight: 1,
            fillColor: '#3399ff',
            fillOpacity: 0.35
        }
    });

    const townshipLayer = L.geoJSON(townshipData, {
        style: {
            color: '#7d3cff',
            weight: 2,
            dashArray: '6',
            fillOpacity: 0.02
        },

        onEachFeature: function(feature, layer) {

            if (feature.properties.NAME) {
                layer.bindPopup(
                    'Township: ' + feature.properties.NAME
                );
            }
        }
    });

    boundaryLayer.addTo(map);
    roadsLayer.addTo(map);
    citiesLayer.addTo(map);

    const overlays = {
        "County Boundary": boundaryLayer,
        "Roads": roadsLayer,
        "Cities": citiesLayer,
        "Flood Zones": floodLayer,
        "Townships": townshipLayer
    };

    L.control.layers(
        null,
        overlays,
        {
            collapsed: false
        }
    ).addTo(map);

    const legend = L.control({ position: 'bottomright' });

    legend.onAdd = function () {

        const div = L.DomUtil.create('div', 'legend');

        div.innerHTML = `
            <b>Legend</b><br><br>

            <span style="color:black;">━━</span>
            County Boundary<br>

            <span style="color:red;">━━</span>
            Roads<br>

            <span style="color:#0066ff;">━━</span>
            Flood Zones<br>

            <span style="color:#7d3cff;">━━</span>
            Townships<br>

            <span style="color:#0055ff;">●</span>
            Cities
        `;

        return div;
    };

    legend.addTo(map);

}

loadLayers();

</script>

</body>
</html>
