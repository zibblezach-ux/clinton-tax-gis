<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 14px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="info-panel">
  <div class="info-title">Clinton County GIS</div>
  Tax concentration heatmap system
</div>

<div id="map"></div>

<script>

const map = L.map('map', {
  preferCanvas: true
});

// ALWAYS ADD BASE TILE FIRST
const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);
L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

let heatLayer;
let heatPoints = [];

let overlays = {};

async function load() {

  // ---------------------------
  // PARCEL HEATMAP (SAFE MODE)
  // ---------------------------

  try {

    const res = await fetch('./static/data/clinton_parcels.json');
    const json = await res.json();

    const parcels =
      Array.isArray(json) ? json :
      Array.isArray(json.data) ? json.data :
      [];

    for (const p of parcels) {

      const xmin = Number(p.__xmin);
      const xmax = Number(p.__xmax);
      const ymin = Number(p.__ymin);
      const ymax = Number(p.__ymax);

      if (
        !isFinite(xmin) ||
        !isFinite(xmax) ||
        !isFinite(ymin) ||
        !isFinite(ymax)
      ) continue;

      const cx = (xmin + xmax) / 2;
      const cy = (ymin + ymax) / 2;

      // robust weight (fallback-safe)
      let weight = 1;

      const d = p.data || {};

      const tax =
        Number(d.tax_value) ||
        Number(d.assessed) ||
        Number(d.market_value) ||
        Number(d.land_val) ||
        Number(d.improv_val);

      if (isFinite(tax) && tax > 0) {
        weight = tax;
      } else {
        const ac = Number(d.deeded_acr);
        weight = (isFinite(ac) ? ac : 1) * 1000;
      }

      heatPoints.push([cy, cx, weight]);
    }

    if (heatPoints.length > 0 && L.heatLayer) {

      heatLayer = L.heatLayer(heatPoints, {
        radius: 25,
        blur: 30,
        maxZoom: 17
      }).addTo(map);

      overlays["Tax Heatmap"] = heatLayer;
    }

  } catch (e) {
    console.log("Heat layer failed", e);
  }

  // ---------------------------
  // LAYER CONTROL (ALWAYS LAST)
  // ---------------------------

  L.control.layers(
    { "OpenStreetMap": osm },
    overlays,
    { collapsed: false }
  ).addTo(map);

}

load();

</script>

</body>
</html>
