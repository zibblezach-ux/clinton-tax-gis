<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <!-- IMPORTANT: heat plugin loaded early -->
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 14px;
      max-width: 280px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div class="info-panel">
  <div class="info-title">Clinton County GIS</div>
  Tax heatmap prototype
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>

const map = L.map('map', { preferCanvas: true });

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);
L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

let countyLayer, roadsLayer, citiesLayer, townshipsLayer, floodLayer, schoolLayer;
let heatLayer = null;
let heatPoints = [];

async function loadMap() {

  try {
    const res = await fetch('./static/clinton_boundary.geojson');
    const data = await res.json();

    countyLayer = L.geoJSON(data, {
      style: { color: '#ff0000', weight: 3, fillOpacity: 0.02 }
    }).addTo(map);

    map.fitBounds(countyLayer.getBounds());

  } catch (e) {
    console.log(e);
  }

  try {
    const res = await fetch('./static/Roads/roads.geojson');
    const data = await res.json();

    roadsLayer = L.geoJSON(data, {
      style: { color: '#666', weight: 0.7, opacity: 0.35, dashArray: '3,3' }
    }).addTo(map);

  } catch (e) {}

  try {
    const res = await fetch('./static/Cities/cities.geojson');
    const data = await res.json();

    citiesLayer = L.geoJSON(data, {
      pointToLayer: (f, latlng) =>
        L.circleMarker(latlng, {
          radius: 5,
          fillColor: '#7a00cc',
          color: '#000',
          weight: 1,
          fillOpacity: 0.85
        })
    }).addTo(map);

  } catch (e) {}

  try {
    const res = await fetch('./static/Townships/townships.geojson');
    const data = await res.json();

    townshipsLayer = L.geoJSON(data, {
      style: { color: '#7aa6ff', weight: 1, dashArray: '2,6', opacity: 0.45 }
    }).addTo(map);

  } catch (e) {}

  try {
    const res = await fetch('./static/Floodzones/floodzones.geojson');
    const data = await res.json();

    floodLayer = L.geoJSON(data, {
      style: { color: '#00aaff', weight: 1, fillOpacity: 0.2 }
    });

  } catch (e) {}

  try {
    const res = await fetch('./static/school_districts/school_districts.geojson');
    const data = await res.json();

    schoolLayer = L.geoJSON(data, {
      style: { color: '#008800', weight: 3, dashArray: '8,4', fillOpacity: 0.02 }
    });

  } catch (e) {}

  // --------------------------
  // HEATMAP SAFE BUILD
  // --------------------------

  try {

    const res = await fetch('./static/data/clinton_parcels.json');
    const json = await res.json();

    const parcels = json.data || [];

    parcels.forEach(p => {

      const xmin = p.__xmin;
      const xmax = p.__xmax;
      const ymin = p.__ymin;
      const ymax = p.__ymax;

      if (
        xmin == null || xmax == null ||
        ymin == null || ymax == null
      ) return;

      const cx = (xmin + xmax) / 2;
      const cy = (ymin + ymax) / 2;

      const weight = parseFloat(p.data?.deeded_acr || 1);

      heatPoints.push([cy, cx, weight]);

    });

    // only create heat layer if plugin exists
    if (typeof L.heatLayer === 'function') {

      heatLayer = L.heatLayer(heatPoints, {
        radius: 20,
        blur: 25,
        maxZoom: 17
      });

    } else {
      console.log("Heat plugin not loaded");
    }

  } catch (e) {
    console.log("Heatmap build failed", e);
  }

  // --------------------------
  // LAYER CONTROL (ALWAYS BUILT)
  // --------------------------

  const overlays = {
    "Roads": roadsLayer,
    "Cities": citiesLayer,
    "Townships": townshipsLayer,
    "Flood Zones": floodLayer,
    "School Districts": schoolLayer
  };

  if (heatLayer) {
    overlays["Tax Heatmap"] = heatLayer;
  }

  L.control.layers(
    { "OpenStreetMap": osm },
    overlays,
    { collapsed: false }
  ).addTo(map);

}

loadMap();

</script>

</body>
</html>
