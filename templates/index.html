<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .city-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #4b0082;
      font-size: 12px;
      font-weight: bold;
    }

    .township-label {
      background: rgba(255,255,255,0.7);
      border: none;
      box-shadow: none;
      color: #0033aa;
      font-size: 11px;
      font-weight: bold;
    }

    .school-label {
      background: rgba(255,255,255,0.75);
      border: none;
      box-shadow: none;
      color: #006600;
      font-size: 12px;
      font-weight: bold;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;

      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 14px;
      max-width: 280px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div class="info-panel">
  <div class="info-title">Clinton County GIS</div>
  Base infrastructure GIS viewer
</div>

<div id="map"></div>

<script>

const map = L.map('map');

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);

L.Control.geocoder({
  defaultMarkGeocode: true
}).addTo(map);

let countyLayer;
let roadsLayer;
let citiesLayer;
let townshipsLayer;
let floodLayer;
let schoolLayer;

async function loadMap() {

  // COUNTY
  try {

    const res = await fetch('./static/clinton_boundary.geojson');
    const data = await res.json();

    countyLayer = L.geoJSON(data, {
      style: {
        color: '#ff0000',
        weight: 3,
        fillOpacity: 0.02
      }
    }).addTo(map);

    map.fitBounds(countyLayer.getBounds());

  } catch (err) {
    console.log("County layer failed:", err);
  }


  // ROADS
  try {

    const res = await fetch('./static/Roads/roads.geojson');
    const data = await res.json();

    roadsLayer = L.geoJSON(data, {
      style: {
        color: '#666666',
        weight: 0.7,
        opacity: 0.35,
        dashArray: '3,3'
      }
    }).addTo(map);

  } catch (err) {
    console.log("Road layer failed:", err);
  }


  // CITIES
  try {

    const res = await fetch('./static/Cities/cities.geojson');
    const data = await res.json();

    citiesLayer = L.geoJSON(data, {

      pointToLayer: (f, latlng) =>
        L.circleMarker(latlng, {
          radius: 5,
          fillColor: '#7a00cc',
          color: '#000',
          weight: 1,
          fillOpacity: 0.85
        }),

      onEachFeature: (f, layer) => {

        if (f.properties?.NAME) {

          layer.bindTooltip(f.properties.NAME, {
            permanent: true,
            className: 'city-label'
          });

        }

      }

    }).addTo(map);

  } catch (err) {
    console.log("City layer failed:", err);
  }


  // TOWNSHIPS
  try {

    const res = await fetch('./static/Townships/townships.geojson');
    const data = await res.json();

    townshipsLayer = L.geoJSON(data, {

      style: {
        color: '#0044ff',
        weight: 3,
        opacity: 1,
        dashArray: null,
        fillColor: '#66a3ff',
        fillOpacity: 0.08
      },

      onEachFeature: function(feature, layer) {

        const name =
          feature.properties?.NAME ||
          feature.properties?.NAMELSAD ||
          "Township";

        layer.bindTooltip(name, {
          permanent: true,
          direction: 'center',
          className: 'township-label'
        });

      }

    }).addTo(map);

  } catch (err) {
    console.log("Township layer failed:", err);
  }


  // FLOOD ZONES
  try {

    const res = await fetch('./static/Floodzones/floodzones.geojson');
    const data = await res.json();

    floodLayer = L.geoJSON(data, {
      style: {
        color: '#00aaff',
        weight: 1,
        fillColor: '#00ccff',
        fillOpacity: 0.20
      }
    });

  } catch (err) {
    console.log("Flood layer failed:", err);
  }


  // SCHOOL DISTRICTS
  try {

    const res = await fetch('./static/school_districts/school_districts.geojson');
    const data = await res.json();

    schoolLayer = L.geoJSON(data, {

      style: {
        color: '#008800',
        weight: 3,
        opacity: 0.9,
        dashArray: '8,4',
        fillOpacity: 0.03
      },

      onEachFeature: function(feature, layer) {

        const name =
          feature.properties?.NAME ||
          feature.properties?.DISTRICT ||
          feature.properties?.LABEL ||
          feature.properties?.NAMELSAD ||
          "School District";

        const center = layer.getBounds().getCenter();

        L.marker(center, {
          icon: L.divIcon({
            className: 'school-label',
            html: name
          })
        }).addTo(map);

      }

    });

  } catch (err) {
    console.log("School layer failed:", err);
  }


  // LAYER CONTROL
  const overlays = {
    "Roads": roadsLayer,
    "Cities": citiesLayer,
    "Townships": townshipsLayer,
    "Flood Zones": floodLayer,
    "School Districts": schoolLayer
  };

  L.control.layers(
    { "OpenStreetMap": osm },
    overlays,
    { collapsed: false }
  ).addTo(map);

}

loadMap();

</script>

</body>
</html>
