<!DOCTYPE html>
<html>
<head>
    <title>Clinton County Tax GIS</title>

    <meta charset="utf-8" />

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #1f4e79;
            color: white;
            padding: 15px;
            font-size: 24px;
        }

        #map {
            height: calc(100vh - 60px);
            width: 100%;
        }
    </style>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>
    Clinton County Tax GIS
</header>

<div id="map"></div>

<script>
    var map = L.map('map').setView([39.45, -94.97], 11);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);
</script>

</body>
</html>
