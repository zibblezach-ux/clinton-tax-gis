<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .city-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #4b0082;
      font-size: 12px;
      font-weight: bold;
    }

    .township-label {
      background: rgba(255,255,255,0.7);
      border: none;
      box-shadow: none;
      color: #0033aa;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 4px;
      white-space: nowrap;
    }

    .school-label {
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,100,0,0.35);
      border-radius: 4px;
      box-shadow: 0 0 4px rgba(0,0,0,0.2);
      color: #006600;
      font-size: 14px;
      font-weight: bold;
      padding: 4px 10px;
      white-space: nowrap;
      text-align: center;
    }

    .parcel-label {
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 3px;
      box-shadow: none;
      color: #111;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 3px;
      white-space: nowrap;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 14px;
      max-width: 320px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div class="info-panel">
  <div class="info-title">Clinton County GIS</div>
  Base infrastructure GIS viewer
  <br><br>
  <strong>Tip:</strong> Click parcels for owner and acreage details
</div>

<div id="map"></div>

<script>

const countyBounds = [
  [39.36, -94.82],
  [39.79, -94.10]
];

const map = L.map('map', {
  maxBounds: countyBounds,
  maxBoundsViscosity: 0.7,
  preferCanvas: true
});

map.setView([39.55, -94.45], 11);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);

L.Control.geocoder({
  defaultMarkGeocode: true
}).addTo(map);


// EMPTY LAYER GROUPS FIRST
// This guarantees the checkbox control appears even if a GeoJSON file fails to load.

const countyLayer = L.layerGroup();
const roadsLayer = L.layerGroup().addTo(map);
const citiesLayer = L.layerGroup();
const townshipsLayer = L.layerGroup();
const floodLayer = L.layerGroup();
const schoolLayer = L.layerGroup();
const parcelsLayer = L.layerGroup();
const salesTaxLayer = L.layerGroup();
const ng911Layer = L.layerGroup();
const waterLayer = L.layerGroup();

let parcelGeoJsonLayer = null;
let parcelLabelsVisible = false;


// LAYER CONTROL
// Only Roads is checked at startup because only roadsLayer is added to the map above.

const overlays = {
  "Roads": roadsLayer,
  "Cities": citiesLayer,
  "Townships": townshipsLayer,
  "Flood Zones": floodLayer,
  "School Districts": schoolLayer,
  "Parcels": parcelsLayer,
  "Sales Tax": salesTaxLayer,
  "NG911": ng911Layer,
  "Water Districts": waterLayer
};

L.control.layers(
  { "OpenStreetMap": osm },
  overlays,
  { collapsed: false }
).addTo(map);


async function loadGeoJson(path, targetLayer, options, label) {

  try {

    const res = await fetch(path);

    if (!res.ok) {
      throw new Error(`${res.status} ${res.statusText}`);
    }

    const data = await res.json();

    const geoJsonLayer = L.geoJSON(data, options);
    geoJsonLayer.addTo(targetLayer);

    return geoJsonLayer;

  } catch (err) {

    console.log(`${label} layer failed:`, err);
    return null;

  }

}


async function loadMap() {

  // COUNTY
  await loadGeoJson(
    './static/clinton_boundary.geojson',
    countyLayer,
    {
      style: {
        color: '#ff0000',
        weight: 3,
        fillOpacity: 0.02
      }
    },
    'County'
  );


  // ROADS
  await loadGeoJson(
    './static/Roads/roads.geojson',
    roadsLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#666666',
        weight: 0.7,
        opacity: 0.35,
        dashArray: '3,3'
      }
    },
    'Road'
  );


  // CITIES
  await loadGeoJson(
    './static/Cities/cities.geojson',
    citiesLayer,
    {
      pointToLayer: (f, latlng) =>
        L.circleMarker(latlng, {
          radius: 5,
          fillColor: '#7a00cc',
          color: '#000',
          weight: 1,
          fillOpacity: 0.85
        }),

      onEachFeature: (f, layer) => {

        if (f.properties?.NAME) {

          layer.bindTooltip(f.properties.NAME, {
            permanent: true,
            className: 'city-label'
          });

        }

      }
    },
    'City'
  );


  // TOWNSHIPS
  await loadGeoJson(
    './static/Townships/townships.geojson',
    townshipsLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#0044ff',
        weight: 3,
        opacity: 1,
        fillColor: '#66a3ff',
        fillOpacity: 0.08
      },

      onEachFeature: function(feature, layer) {

        const name =
          feature.properties?.NAME ||
          feature.properties?.NAMELSAD ||
          "Township";

        layer.bindTooltip(name, {
          permanent: true,
          direction: 'center',
          className: 'township-label'
        });

      }
    },
    'Township'
  );


  // FLOOD ZONES
  await loadGeoJson(
    './static/Floodzones/floodzones.geojson',
    floodLayer,
    {
      renderer: L.canvas(),

      style: function(feature) {

        const zone =
          feature.properties?.FLD_ZONE ||
          feature.properties?.ZONE ||
          "";

        if (zone === "AE" || zone === "A") {

          return {
            color: '#0088ff',
            weight: 1,
            fillColor: '#00aaff',
            fillOpacity: 0.20
          };

        }

        return {
          color: '#66ccff',
          weight: 0.4,
          fillColor: '#99ddff',
          fillOpacity: 0.01
        };

      }
    },
    'Flood'
  );


  // SCHOOL DISTRICTS
  await loadGeoJson(
    './static/school_districts/school_districts.geojson',
    schoolLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#008800',
        weight: 3,
        opacity: 0.9,
        dashArray: '8,4',
        fillColor: '#b7e3b7',
        fillOpacity: 0.04
      },

      onEachFeature: function(feature, layer) {

        const name = feature.properties?.NAME || "";

        if (name) {

          let tooltipOptions = {
            permanent: true,
            sticky: false,
            direction: 'center',
            className: 'school-label',
            opacity: 1
          };

          if (name.includes("Osborn")) {
            tooltipOptions.offset = [55, 14];
          }

          layer.bindTooltip(name, tooltipOptions);

        }

      }
    },
    'School'
  );


  // PARCELS
  parcelGeoJsonLayer = await loadGeoJson(
    './static/Parcels/parcels.geojson',
    parcelsLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#444444',
        weight: 0.35,
        opacity: 0.45,
        fillColor: '#cccccc',
        fillOpacity: 0.02
      },

      onEachFeature: function(feature, layer) {

        const parcelNum = feature.properties?.parcel_num || "";
        const owner = feature.properties?.deedholder || "";
        const acres = feature.properties?.deeded_acr || "";

        layer.bindPopup(`
          <b>Parcel:</b> ${parcelNum}<br>
          <b>Owner:</b> ${owner}<br>
          <b>Acres:</b> ${acres}
        `);

      }
    },
    'Parcel'
  );


  // SALES TAX
  await loadGeoJson(
    './static/SalesTax/sales_tax.geojson',
    salesTaxLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#cc5500',
        weight: 1.5,
        opacity: 0.9,
        fillColor: '#ff9900',
        fillOpacity: 0.10
      },

      onEachFeature: function(feature, layer) {

        const name =
          feature.properties?.JURISDICTION_NAME ||
          feature.properties?.NAME ||
          "Unknown";

        const rate =
          feature.properties?.SALES_TAX ||
          feature.properties?.RATE ||
          "Unknown";

        layer.bindPopup(`
          <b>Jurisdiction:</b> ${name}<br>
          <b>Sales Tax:</b> ${rate}%
        `);

      }
    },
    'Sales tax'
  );


  // NG911
  await loadGeoJson(
    './static/NG911/ng911.geojson',
    ng911Layer,
    {
      renderer: L.canvas(),

      style: {
        color: '#ff00aa',
        weight: 4,
        opacity: 1,
        dashArray: '8,6',
        fillColor: '#ff66cc',
        fillOpacity: 0.04
      },

      onEachFeature: function(feature, layer) {

        const county =
          feature.properties?.COUNTYNAME ||
          feature.properties?.COUNTY ||
          "Unknown";

        layer.bindPopup(`
          <b>NG911 County:</b> ${county}
        `);

      }
    },
    'NG911'
  );


  // WATER DISTRICTS
  await loadGeoJson(
    './static/Water/water.geojson',
    waterLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#006699',
        weight: 2,
        opacity: 0.8,
        fillColor: '#66ccff',
        fillOpacity: 0.08
      },

      onEachFeature: function(feature, layer) {

        const name =
          feature.properties?.PWSSNAME ||
          feature.properties?.NAME ||
          "Unknown";

        layer.bindPopup(`
          <b>Water District:</b> ${name}
        `);

      }
    },
    'Water'
  );

}


map.on('zoomend', function() {

  if (!parcelGeoJsonLayer || !map.hasLayer(parcelsLayer)) {
    return;
  }

  const zoom = map.getZoom();

  if (zoom >= 18 && !parcelLabelsVisible) {

    parcelLabelsVisible = true;

    let visibleCount = 0;

    parcelGeoJsonLayer.eachLayer(function(layer) {

      if (visibleCount > 250) {
        return;
      }

      if (!layer.getBounds || !map.getBounds().intersects(layer.getBounds())) {
        return;
      }

      const parcelNum = layer.feature.properties?.parcel_num || "";

      if (parcelNum) {

        layer.bindTooltip(parcelNum, {
          permanent: true,
          direction: 'center',
          className: 'parcel-label'
        });

        visibleCount++;

      }

    });

  }

  if (zoom < 18 && parcelLabelsVisible) {

    parcelLabelsVisible = false;

    parcelGeoJsonLayer.eachLayer(function(layer) {

      if (layer.getTooltip()) {
        layer.unbindTooltip();
      }

    });

  }

});


loadMap();

</script>

</body>
</html>
