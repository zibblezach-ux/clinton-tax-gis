<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
  />

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .city-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #4b0082;
      font-size: 12px;
      font-weight: bold;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;

      background: rgba(255,255,255,0.95);

      padding: 10px 14px;

      border-radius: 6px;

      box-shadow: 0 0 8px rgba(0,0,0,0.3);

      max-width: 280px;

      font-size: 14px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

  </style>
</head>

<body>

<div class="info-panel">

  <div class="info-title">
    Clinton County GIS
  </div>

  Parcel-enabled county GIS prototype.

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>

const map = L.map('map', {
  preferCanvas: true
});

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);

L.Control.geocoder({
  defaultMarkGeocode: true
}).addTo(map);

let countyLayer;
let roadsLayer;
let citiesLayer;
let townshipsLayer;
let floodLayer;
let schoolLayer;
let parcelLayer = L.layerGroup();

async function loadMap() {

  // COUNTY

  try {

    const countyResponse =
      await fetch('./static/clinton_boundary.geojson');

    const countyData =
      await countyResponse.json();

    countyLayer = L.geoJSON(countyData, {

      style: {
        color: '#ff0000',
        weight: 3,
        fillOpacity: 0.02
      }

    }).addTo(map);

    map.fitBounds(countyLayer.getBounds());

  } catch (err) {

    console.log(err);

  }


  // ROADS

  try {

    const roadsResponse =
      await fetch('./static/Roads/roads.geojson');

    const roadsData =
      await roadsResponse.json();

    roadsLayer = L.geoJSON(roadsData, {

      style: {
        color: '#666666',
        weight: 0.7,
        opacity: 0.35,
        dashArray: '3,3'
      }

    });

  } catch (err) {

    console.log(err);

  }


  // CITIES

  try {

    const citiesResponse =
      await fetch('./static/Cities/cities.geojson');

    const citiesData =
      await citiesResponse.json();

    citiesLayer = L.geoJSON(citiesData, {

      pointToLayer: function(feature, latlng) {

        return L.circleMarker(latlng, {

          radius: 5,
          fillColor: '#7a00cc',
          color: '#000',
          weight: 1,
          opacity: 1,
          fillOpacity: 0.85

        });

      },

      onEachFeature: function(feature, layer) {

        if (feature.properties && feature.properties.NAME) {

          layer.bindTooltip(
            feature.properties.NAME,
            {
              permanent: true,
              direction: 'top',
              className: 'city-label'
            }
          );

        }

      }

    });

  } catch (err) {

    console.log(err);

  }


  // TOWNSHIPS

  try {

    const townshipResponse =
      await fetch('./static/Townships/townships.geojson');

    const townshipData =
      await townshipResponse.json();

    townshipsLayer = L.geoJSON(townshipData, {

      style: {
        color: '#7aa6ff',
        weight: 1,
        dashArray: '2,6',
        opacity: 0.45,
        fillOpacity: 0
      }

    });

  } catch (err) {

    console.log(err);

  }


  // FLOOD ZONES

  try {

    const floodResponse =
      await fetch('./static/Floodzones/floodzones.geojson');

    const floodData =
      await floodResponse.json();

    floodLayer = L.geoJSON(floodData, {

      style: {
        color: '#00aaff',
        weight: 1,
        fillColor: '#00ccff',
        fillOpacity: 0.20
      }

    });

  } catch (err) {

    console.log(err);

  }


  // SCHOOL DISTRICTS

  try {

    const schoolResponse =
      await fetch('./static/school_districts/school_districts.geojson');

    const schoolData =
      await schoolResponse.json();

    schoolLayer = L.geoJSON(schoolData, {

      style: {
        color: '#008800',
        weight: 3,
        opacity: 0.9,
        dashArray: '8,4',
        fillOpacity: 0.02
      }

    });

  } catch (err) {

    console.log(err);

  }


  // PARCELS

  try {

    const parcelResponse =
      await fetch('./static/data/clinton_parcels.json');

    const parcelData =
      await parcelResponse.json();

    console.log('Parcel count:', parcelData.data.length);

    parcelData.data.forEach(parcel => {

      const d = parcel.data;

      if (
        parcel.__xmin &&
        parcel.__xmax &&
        parcel.__ymin &&
        parcel.__ymax
      ) {

        const sw =
          L.Projection.SphericalMercator.unproject(
            L.point(parcel.__xmin, parcel.__ymin)
          );

        const ne =
          L.Projection.SphericalMercator.unproject(
            L.point(parcel.__xmax, parcel.__ymax)
          );

        const rect = L.rectangle(
          [sw, ne],
          {
            renderer: L.canvas(),
            color: '#ff7800',
            weight: 0.4,
            fillOpacity: 0.05
          }
        );

        rect.bindPopup(`
          <b>Parcel:</b> ${d.parcel_num || ''}<br>
          <b>Owner:</b> ${d.deedholder || ''}<br>
          <b>Address:</b> ${d.siteaddres || ''}
        `);

        parcelLayer.addLayer(rect);

      }

    });

  } catch (err) {

    console.log(err);
    console.log('Parcel layer failed');

  }


  // DEFAULT LAYERS

  if (roadsLayer) roadsLayer.addTo(map);
  if (citiesLayer) citiesLayer.addTo(map);
  if (townshipsLayer) townshipsLayer.addTo(map);


  // CONTROLS

  const overlays = {};

  if (roadsLayer)
    overlays['Roads'] = roadsLayer;

  if (citiesLayer)
    overlays['Cities'] = citiesLayer;

  if (townshipsLayer)
    overlays['Townships'] = townshipsLayer;

  if (floodLayer)
    overlays['Flood Zones'] = floodLayer;

  if (schoolLayer)
    overlays['School Districts'] = schoolLayer;

  overlays['Parcels'] = parcelLayer;

  L.control.layers(
    {
      'OpenStreetMap': osm
    },
    overlays,
    {
      collapsed: false
    }
  ).addTo(map);

}

loadMap();

</script>

</body>
</html>
