<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.heat/dist/leaflet-heat.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 14px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="info-panel">
  <div class="info-title">Clinton County GIS</div>
  Tax concentration heatmap system
</div>

<div id="map"></div>

<script>

const map = L.map('map', { preferCanvas: true });

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);
L.Control.geocoder({ defaultMarkGeocode: true }).addTo(map);

let heatLayer;
let heatPoints = [];

async function build() {

  const res = await fetch('./static/data/clinton_parcels.json');
  const json = await res.json();
  const data = json.data || [];

  for (const p of data) {

    const xmin = p.__xmin, xmax = p.__xmax;
    const ymin = p.__ymin, ymax = p.__ymax;

    if (
      xmin == null || xmax == null ||
      ymin == null || ymax == null
    ) continue;

    const cx = (xmin + xmax) / 2;
    const cy = (ymin + ymax) / 2;

    // FINAL WEIGHT MODEL (robust, no dependency on exact schema)
    let weight = 1;

    const v =
      parseFloat(p?.data?.tax_value) ||
      parseFloat(p?.data?.assessed) ||
      parseFloat(p?.data?.market_value) ||
      parseFloat(p?.data?.land_val) ||
      parseFloat(p?.data?.improv_val);

    if (!isNaN(v) && v > 0) {
      weight = v;
    } else {
      const ac = parseFloat(p?.data?.deeded_acr);
      weight = (!isNaN(ac) ? ac : 1) * 1000;
    }

    heatPoints.push([cy, cx, weight]);
  }

  heatLayer = L.heatLayer(heatPoints, {
    radius: 25,
    blur: 30,
    maxZoom: 17
  }).addTo(map);

  const overlays = {
    "Tax Heatmap": heatLayer
  };

  L.control.layers(
    { "OpenStreetMap": osm },
    overlays,
    { collapsed: false }
  ).addTo(map);

}

build();

</script>

</body>
</html>
