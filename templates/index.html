<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Clinton County GIS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .leaflet-control-layers {
      font-size: 14px;
      max-height: 350px;
      overflow-y: auto;
    }

    .city-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #4b0082;
      font-size: 12px;
      font-weight: bold;
    }

    .township-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #0033aa;
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
    }

    .school-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #006600;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      text-align: center;
    }

    .water-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #005f87;
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
      text-align: center;
      width: auto !important;
      height: auto !important;
      line-height: 1.2;
      text-shadow:
        -1px -1px 0 #fff,
         1px -1px 0 #fff,
        -1px  1px 0 #fff,
         1px  1px 0 #fff;
    }

    .fire-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #cc0000;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      text-align: center;
      width: auto !important;
      height: auto !important;
      line-height: 1.2;
      text-shadow:
        -1px -1px 0 #fff,
         1px -1px 0 #fff,
        -1px  1px 0 #fff,
         1px  1px 0 #fff;
    }

    .parcel-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #111;
      font-size: 10px;
      font-weight: bold;
      white-space: nowrap;
    }

    .info-panel {
      position: absolute;
      top: 10px;
      left: 60px;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 10px 14px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      font-size: 14px;
      max-width: 320px;
    }

    .info-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .tax-popup table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    .tax-popup th,
    .tax-popup td {
      border-bottom: 1px solid #ddd;
      padding: 3px 5px;
      text-align: left;
      vertical-align: top;
    }

    .tax-popup th {
      font-weight: bold;
      background: #f5f5f5;
    }

    .tax-total {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 2px solid #ccc;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="info-panel">
  <div class="info-title">Clinton County GIS</div>
  Base infrastructure GIS viewer
</div>

<div id="map"></div>

<script>

const MISSOURI_STATE_RATE = 4.225;

const countyBounds = [
  [39.30, -94.84],
  [39.82, -94.05]
];

const map = L.map('map', {
  maxBounds: countyBounds,
  maxBoundsViscosity: 0.7,
  preferCanvas: true
});

map.setView([39.58, -94.50], 10.7);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

L.control.scale().addTo(map);

L.Control.geocoder({
  defaultMarkGeocode: true
}).addTo(map);


// LAYER GROUPS
const roadsLayer = L.layerGroup().addTo(map);
const citiesLayer = L.layerGroup();
const townshipsLayer = L.layerGroup();
const floodLayer = L.layerGroup();
const schoolLayer = L.layerGroup();
const parcelsLayer = L.layerGroup();
const fireLayer = L.layerGroup();

const salesTaxLayer = L.layerGroup();
const waterLayer = L.layerGroup();

let salesTaxFeatures = [];


// CHECKBOXES
const overlays = {
  "Roads": roadsLayer,
  "Cities": citiesLayer,
  "Townships": townshipsLayer,
  "Flood Zones": floodLayer,
  "School Districts": schoolLayer,
  "Parcels": parcelsLayer,
  "Sales Tax": salesTaxLayer,
  "Water Districts": waterLayer,
  "Fire Districts": fireLayer
};

L.control.layers(
  { "OpenStreetMap": osm },
  overlays,
  { collapsed: false }
).addTo(map);


// GENERIC LOADER
async function loadLayer(url, target, options, label) {

  try {

    console.log("Loading:", url);

    const response = await fetch(url);

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();

    console.log(label, "loaded");

    const geo = L.geoJSON(data, options);

    geo.addTo(target);

    return geo;

  } catch (err) {

    console.error(label + " failed:", err);
    return null;

  }

}


function pointOnFeatureLatLng(feature) {

  try {

    const point = turf.pointOnFeature(feature);

    return [
      point.geometry.coordinates[1],
      point.geometry.coordinates[0]
    ];

  } catch (err) {

    return null;

  }

}


function escapeHtml(value) {

  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");

}


function formatRate(value) {

  if (value === null || value === undefined || value === "") {
    return "0";
  }

  const number = Number(value);

  if (Number.isNaN(number)) {
    return escapeHtml(value);
  }

  return number.toFixed(3);

}


function salesTaxPopupHtml(matches) {

  if (!matches.length) {
    return "<b>No sales tax polygon found at this point.</b>";
  }

  const rows = matches.map(feature => {

    const p = feature.properties || {};

    const name = escapeHtml(p.JURISDICTION_NAME || "Unnamed");
    const type = escapeHtml(p.JURISDICTION_TYPE || "");
    const sales = Number(p.SALES_TAX || 0);

    return `
      <tr>
        <td>${name}</td>
        <td>${type}</td>
        <td>${formatRate(sales)}%</td>
      </tr>
    `;

  }).join("");

  const localTotal = matches.reduce((sum, feature) => {

    const value = Number(feature.properties?.SALES_TAX || 0);

    return sum + (Number.isNaN(value) ? 0 : value);

  }, 0);

  const combinedTotal = MISSOURI_STATE_RATE + localTotal;

  return `
    <div class="tax-popup">

      <b>Sales tax jurisdictions at this point</b>

      <table>
        <thead>
          <tr>
            <th>Jurisdiction</th>
            <th>Type</th>
            <th>Rate</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>Missouri State</td>
            <td>STATE</td>
            <td>${formatRate(MISSOURI_STATE_RATE)}%</td>
          </tr>

          ${rows}

        </tbody>
      </table>

      <div class="tax-total">
        <b>Missouri State:</b>
        ${formatRate(MISSOURI_STATE_RATE)}%<br>

        <b>Local Add-ons:</b>
        ${formatRate(localTotal)}%<br>

        <b>Combined Total:</b>
        ${formatRate(combinedTotal)}%
      </div>

    </div>
  `;
}


async function loadMap() {

  // WATER
  await loadLayer(
    './static/Water/water.geojson',
    waterLayer,
    {
      renderer: L.canvas(),

      style: {
        color: '#006699',
        weight: 2,
        opacity: 1,
        fillOpacity: 0
      },

      onEachFeature: function(feature, layer) {

        const name =
          feature.properties?.PWSSNAME ||
          "Water District";

        const labelLatLng = pointOnFeatureLatLng(feature);

        if (labelLatLng) {

          let adjustedLatLng = labelLatLng;

          // RECENTER DEKALB LABEL
          if (name.includes("DeKalb")) {
            adjustedLatLng = [
              labelLatLng[0] + 0.004,
              labelLatLng[1] - 0.012
            ];
          }

          const label = L.marker(adjustedLatLng, {
            interactive: false,
            icon: L.divIcon({
              className: 'water-label',
              html: escapeHtml(name),
              iconSize: null
            })
          });

          waterLayer.addLayer(label);

        }

      }
    },
    'Water'
  );

}

loadMap();

</script>

</body>
</html>
